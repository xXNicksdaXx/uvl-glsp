variables:
  NODE_VERSION: 20
  JAVA_VERSION: 21
  DEBIAN_FRONTEND: "noninteractive"

image: ubuntu:22.04

stages:
  - build
  - test

# Define a reusable anchor for the setup steps
.setup_env: &setup_env
  before_script:
    - apt-get update -qq

    # 1. Install prerequisites for adding external repositories
    - apt-get install -y -qq curl ca-certificates gnupg
    
    # 2. Add the official NodeSource repository for Node.js
    - curl -fsSL https://deb.nodesource.com/setup_$NODE_VERSION.x | bash -
    
    # 3. Install Node.js, Java, Maven, Python, and Build Tools
    - apt-get install -y -qq nodejs openjdk-$JAVA_VERSION-jdk maven
    
    # 4. Install Yarn (since raw Node.js doesn't bundle it) and Lerna globally
    - npm install -g yarn lerna

build_server:
  stage: build
  <<: *setup_env
  script:
    - cd server
    - mvn --batch-mode clean verify
  artifacts:
    paths:
      - server/
    expire_in: 1 hour

build_client:
  stage: build
  <<: *setup_env
  script:
    - cd client
    - yarn cache clean
    - yarn
  artifacts:
    paths:
      - client/
    expire_in: 1 hour

run_playwright_tests:
  stage: test
  <<: *setup_env
  script:
    - cd test
    - yarn cache clean
    - yarn playwright install --with-deps
    - yarn
    - yarn test
  needs:
    - build_server
    - build_client
  artifacts:
    when: always
    paths:
      - test/playwright-report/
      - test/test-results/
    expire_in: 7 days